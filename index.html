<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天海之地 - 官方下載頁面</title>
    <style>
        :root {
            --bg-color: #f4e4bc; 
            --parchment-texture: url('https://www.transparenttextures.com/patterns/dark-dotted-2.png');
            --ink-color: #3e2723;
            --border-color: #a1887f;
            --accent-color: #d84315;
            --font-family: 'Times New Roman', 'PingFang TC', serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: var(--parchment-texture);
            color: var(--ink-color);
            font-family: var(--font-family);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 95%;
            margin-top: 30px;
            background: #fff8e1;
            border: 3px double var(--border-color);
            padding: 40px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            position: relative;
            background-clip: padding-box;
        }

        .container::before, .container::after {
            content: "";
            position: absolute;
            width: 50px;
            height: 50px;
            border: 5px solid var(--border-color);
        }
        .container::before { top: -15px; left: -15px; border-right: none; border-bottom: none; }
        .container::after { bottom: -15px; right: -15px; border-left: none; border-top: none; }

        h1 {
            color: var(--ink-color);
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .lore-box {
            background: rgba(216, 67, 21, 0.05);
            border: 2px dashed var(--accent-color);
            padding: 20px;
            margin-bottom: 35px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* 下載按鈕樣式 */
        .download-btn {
            display: block;
            width: 280px;
            margin: 0 auto;
            background: var(--accent-color);
            color: #fff;
            padding: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            border: 2px solid #8e24aa;
            text-transform: uppercase;
            text-align: center;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.3);
            font-size: 1.2em;
        }

        .download-btn:hover {
            background: #bf360c;
            transform: translateY(-2px);
            box-shadow: 5px 5px 0px rgba(0,0,0,0.4);
        }

        .credits {
            margin-top: 50px;
            font-size: 0.95em;
            border-top: 1px solid var(--border-color);
            padding-top: 25px;
        }

        .team-member { font-weight: bold; color: #5d4037; }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.85em;
            text-align: center;
            width: 100%;
            color: #8d6e63;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>天海之地 (Heaven & Sea)</h1>
    
    <div class="lore-box">
        <strong>勇士請注意：</strong>邪惡的「咒術忍者」正不斷從草叢中竄出！<br>
        他們渴望著搶走你手中的<strong>統一布丁</strong>。<br>
        點擊下方按鈕獲取武裝，守護你的甜點！
    </div>

    <a href="天海之地.exe" class="download-btn" download>取得武裝 (.EXE)</a>

    <div class="credits">
        <p>此卷軸由以下團隊簽署：</p>
        <ul>
            <li>主要作者：<span class="team-member">dongdaxia</span></li>
            <li>技術協作：<span class="team-member">Gemini</span>, <span class="team-member">Aresir</span></li>
        </ul>
    </div>
</div>

<footer>
    <p>Apache License Version 2.0, January 2004</p>
    <p>&copy; 2026 天海之地開發組. All Rights Reserved.</p>
</footer>

</body>
</html>
